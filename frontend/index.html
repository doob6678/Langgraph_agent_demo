<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph Agent Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="/frontend/css/styles.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1 class="text-xl font-bold">LangGraph Agent</h1>
            <p class="text-sm opacity-90">Powered by LangChain & Milvus</p>
        </div>
        
        <div id="messages" class="messages-area">
            <!-- Messages will appear here -->
            <div class="message assistant-message">
                你好！我是基于 LangGraph 的智能助手。我可以帮你搜索信息、分析图片或回答问题。可以直接粘贴图片进行分析，或者询问我搜索相关图片。
            </div>
        </div>
        
        <div class="input-area">
            <!-- Image Preview Area -->
            <div id="image-preview-container" class="image-preview-container relative inline-block">
                <img id="image-preview" class="image-preview" src="" alt="Preview">
                <button onclick="removeImage()" class="remove-image">×</button>
            </div>

            <form id="chat-form" class="flex gap-4 items-end">
                <div class="flex-1 relative">
                    <input type="text" id="user-input" 
                        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        placeholder="输入你的问题，或 Ctrl+V 粘贴图片..." autocomplete="off">
                </div>
                <!-- Hidden file input for manual upload if needed -->
                <input type="file" id="image-input" accept="image/*" style="display: none;" onchange="handleImageFile(this.files[0])">
                <button type="button" onclick="document.getElementById('image-input').click()" 
                    class="p-3 text-gray-500 hover:text-blue-600 transition" title="上传图片">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </button>
                <button type="submit" 
                    class="px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                    发送
                </button>
            </form>
            <div class="mt-2 flex gap-4 text-sm text-gray-600">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="use-rag" checked class="rounded text-blue-600">
                    <span>RAG 检索</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="use-search" checked class="rounded text-blue-600">
                    <span>联网搜索</span>
                </label>
            </div>
        </div>
    </div>

    <script src="/frontend/js/script.js"></script>
</body>
</html>
