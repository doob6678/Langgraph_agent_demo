<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph Agent 测试平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }
        
        .chat-section, .metrics-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #e9ecef;
        }
        
        .section-title {
            font-size: 1.4em;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 500;
        }
        
        .input-field {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        
        .textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #4facfe;
        }
        
        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .response-area {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e9ecef;
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .response-content {
            line-height: 1.6;
            color: #2c3e50;
        }
        
        .response-content h4 {
            color: #4facfe;
            margin-bottom: 10px;
        }
        
        .response-content .image-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #4facfe;
        }
        
        .response-content .search-item {
            background: #fff3cd;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #ffc107;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .metric-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #4facfe;
            margin-bottom: 5px;
        }
        
        .metric-label {
            color: #6c757d;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .timing-breakdown {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e9ecef;
        }
        
        .timing-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f3f4;
        }
        
        .timing-item:last-child {
            border-bottom: none;
        }
        
        .timing-name {
            color: #495057;
            font-weight: 500;
        }
        
        .timing-value {
            color: #4facfe;
            font-weight: bold;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .file-upload {
            border: 2px dashed #4facfe;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .file-upload:hover {
            background: rgba(79, 172, 254, 0.05);
        }
        
        .file-upload input[type="file"] {
            display: none;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .checkbox-group {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 LangGraph Agent</h1>
            <p>智能问答系统 - 集成RAG检索与联网搜索</p>
        </div>
        
        <div class="main-content">
            <!-- 聊天区域 -->
            <div class="chat-section">
                <h2 class="section-title">
                    💬 智能对话
                </h2>
                
                <div class="input-group">
                    <label for="userInput">输入您的问题：</label>
                    <textarea 
                        id="userInput" 
                        class="input-field textarea" 
                        placeholder="例如：搜:安卓图标 或 告诉我今天的科技新闻"
                    ></textarea>
                </div>
                
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="useRag" checked>
                        <label for="useRag">启用RAG图片检索</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="useSearch" checked>
                        <label for="useSearch">启用联网搜索</label>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="topK">返回结果数量：</label>
                    <select id="topK" class="input-field">
                        <option value="3">3个</option>
                        <option value="5" selected>5个</option>
                        <option value="10">10个</option>
                    </select>
                </div>
                
                <div class="file-upload" onclick="document.getElementById('imageFile').click()">
                    <input type="file" id="imageFile" accept="image/*" onchange="handleFileSelect(event)">
                    <p>📷 点击上传图片（可选）</p>
                    <p id="fileName" style="margin-top: 10px; color: #4facfe;"></p>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn" onclick="sendMessage()" id="sendBtn">
                        <span>🚀</span> 发送消息
                    </button>
                    <button class="btn btn-secondary" onclick="clearChat()">
                        <span>🗑️</span> 清空
                    </button>
                </div>
                
                <div id="responseArea" class="response-area" style="display: none;">
                    <div id="responseContent" class="response-content"></div>
                </div>
            </div>
            
            <!-- 性能监控区域 -->
            <div class="metrics-section">
                <h2 class="section-title">
                    📊 性能监控
                </h2>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="totalRequests">0</div>
                        <div class="metric-label">总请求数</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="avgResponseTime">0</div>
                        <div class="metric-label">平均响应时间(ms)</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="successRate">100%</div>
                        <div class="metric-label">成功率</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="activeTools">0</div>
                        <div class="metric-label">活跃工具数</div>
                    </div>
                </div>
                
                <div id="timingBreakdown" class="timing-breakdown" style="display: none;">
                    <h4 style="margin-bottom: 15px; color: #2c3e50;">⏱️ 本次请求耗时分析</h4>
                    <div id="timingItems"></div>
                </div>

                <div id="streamDebug" class="timing-breakdown" style="display: none;">
                    <h4 style="margin-bottom: 15px; color: #2c3e50;">🧰 工具调用与 Token</h4>
                    <div id="tokenItems"></div>
                    <div id="toolItems" style="margin-top: 15px;"></div>
                </div>
                
                <div style="margin-top: 20px;">
                    <button class="btn" onclick="refreshMetrics()">
                        <span>🔄</span> 刷新指标
                    </button>
                    <button class="btn btn-secondary" onclick="resetMetrics()">
                        <span>🔄</span> 重置统计
                    </button>
                </div>

                <div class="timing-breakdown" style="margin-top:20px;">
                    <h4 style="margin-bottom: 15px; color: #2c3e50;">🔑 大模型配置</h4>
                    <div class="input-group">
                        <label for="arkApiKey">ARK_API_KEY（仅保存在内存，不写入文件）</label>
                        <input id="arkApiKey" type="password" class="input-field" placeholder="粘贴你的 ARK_API_KEY">
                        <div id="arkKeyStatus" style="margin-top:8px; color:#6c757d; font-size:0.9em;"></div>
                    </div>
                    <div class="input-group">
                        <label for="arkBaseUrl">ARK_BASE_URL</label>
                        <input id="arkBaseUrl" type="text" class="input-field" placeholder="https://ark.cn-beijing.volces.com/api/v3">
                    </div>
                    <div class="input-group">
                        <label for="arkModel">ARK_MODEL</label>
                        <input id="arkModel" type="text" class="input-field" placeholder="doubao-seed-2-0-lite-260215">
                    </div>
                    <div class="input-group">
                        <label for="agentMode">AGENT_MODE（留空=自动；rule_based=离线；其他=走大模型）</label>
                        <input id="agentMode" type="text" class="input-field" placeholder="">
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn" onclick="saveConfig()">
                            <span>💾</span> 保存配置
                        </button>
                        <button class="btn btn-secondary" onclick="loadConfig()">
                            <span>🔄</span> 读取当前配置
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let requestCount = 0;
        let totalResponseTime = 0;
        let successCount = 0;
        let errorCount = 0;
        let selectedFile = null;
        let currentAbortController = null;
        let streamRenderScheduled = false;
        let streamState = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 添加回车键发送功能
            document.getElementById('userInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    sendMessage();
                }
            });
            
            // 初始化指标
            updateMetricsDisplay();
            loadConfig();
        });
        
        // 处理文件选择
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileName').textContent = `已选择: ${file.name}`;
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput && !selectedFile) {
                showError('请输入问题或上传图片');
                return;
            }
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span> 处理中...';
            
            const startTime = Date.now();
            
            try {
                if (currentAbortController) {
                    try { currentAbortController.abort(); } catch (e) {}
                }
                currentAbortController = new AbortController();

                streamState = {
                    text: '',
                    toolCalls: [],
                    toolEvents: [],
                    usage: null,
                    final: null
                };

                const formData = new FormData();
                formData.append('text', userInput);
                formData.append('use_rag', document.getElementById('useRag').checked);
                formData.append('use_search', document.getElementById('useSearch').checked);
                formData.append('top_k', document.getElementById('topK').value);
                formData.append('stream', 'true');
                
                if (selectedFile) {
                    formData.append('image', selectedFile);
                }
                
                const responseArea = document.getElementById('responseArea');
                const responseContent = document.getElementById('responseContent');
                responseArea.style.display = 'block';
                responseContent.innerHTML = `<div class="success-message">连接中，等待流式输出...</div>`;
                document.getElementById('timingBreakdown').style.display = 'none';
                document.getElementById('streamDebug').style.display = 'none';

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'text/event-stream'
                    },
                    signal: currentAbortController.signal
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || '请求失败');
                }

                const ctype = (response.headers.get('content-type') || '').toLowerCase();
                if (ctype.startsWith('text/event-stream')) {
                    await readEventStream(response, startTime);
                } else {
                    const result = await response.json();
                    renderFinalFromJson(result, startTime);
                }

                // 清空输入
                document.getElementById('userInput').value = '';
                selectedFile = null;
                document.getElementById('fileName').textContent = '';
                document.getElementById('imageFile').value = '';
                
            } catch (error) {
                errorCount++;
                showError(`请求失败: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<span>🚀</span> 发送消息';
                updateMetricsDisplay();
            }
        }

        async function readEventStream(response, startTime) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            let done = false;

            while (!done) {
                const { value, done: readerDone } = await reader.read();
                done = readerDone;
                if (value) {
                    buffer += decoder.decode(value, { stream: true });
                    buffer = processSseBuffer(buffer);
                }
            }

            const endTime = Date.now();
            const responseTime = endTime - startTime;
            requestCount++;
            totalResponseTime += responseTime;
            successCount++;

            if (streamState && streamState.final && streamState.final.timing) {
                displayTiming(streamState.final.timing || {});
            }
            renderStreamDebug();
        }

        function processSseBuffer(buffer) {
            const chunks = buffer.split('\n\n');
            const remain = chunks.pop() || '';
            for (const chunk of chunks) {
                const lines = chunk.split('\n');
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;
                    if (!trimmed.startsWith('data:')) continue;
                    const data = trimmed.slice(5).trimStart();
                    if (data === '[DONE]') {
                        return remain;
                    }
                    let obj = null;
                    try { obj = JSON.parse(data); } catch (e) { obj = null; }
                    if (obj) handleStreamChunk(obj);
                }
            }
            return remain;
        }

        function handleStreamChunk(obj) {
            if (!streamState) return;
            if (obj.choices && obj.choices.length > 0) {
                const delta = (obj.choices[0] && obj.choices[0].delta) ? obj.choices[0].delta : null;
                if (delta) {
                    if (typeof delta.content === 'string' && delta.content.length > 0) {
                        streamState.text += delta.content;
                    }
                    if (Array.isArray(delta.tool_calls) && delta.tool_calls.length > 0) {
                        streamState.toolCalls = delta.tool_calls;
                    }
                }
            }
            if (obj.x_tool_event) {
                streamState.toolEvents.push(obj.x_tool_event);
            }
            if (obj.usage && typeof obj.usage === 'object') {
                streamState.usage = obj.usage;
            }
            if (obj.x_final && typeof obj.x_final === 'object') {
                streamState.final = obj.x_final;
            }
            scheduleStreamRender();
        }

        function scheduleStreamRender() {
            if (streamRenderScheduled) return;
            streamRenderScheduled = true;
            requestAnimationFrame(() => {
                streamRenderScheduled = false;
                renderStream();
            });
        }

        function renderStream() {
            if (!streamState) return;
            const responseArea = document.getElementById('responseArea');
            const responseContent = document.getElementById('responseContent');
            responseArea.style.display = 'block';

            const answerHtml = renderMarkdown(streamState.text || '');
            let html = `<h4>🤖 智能回答（流式）</h4>`;
            html += `<div>${answerHtml || '<span style="color:#6c757d">等待输出...</span>'}</div>`;

            const final = streamState.final;
            if (final && Array.isArray(final.images) && final.images.length > 0) {
                html += `<h4 style="margin-top:15px;">🖼️ 检索到的图片 (${final.images.length}张)</h4>`;
                final.images.forEach((image, index) => {
                    const filename = (image && image.filename) ? image.filename : 'unknown';
                    const score = (image && typeof image.score === 'number') ? image.score : (image && typeof image.similarity === 'number' ? image.similarity : 0);
                    html += `
                        <div class="image-item">
                            <p><strong>${index + 1}. ${escapeHtml(filename)}</strong></p>
                            <p>相似度: ${(score * 100).toFixed(2)}%</p>
                            <img src="/assets/${encodeURIComponent(filename)}" 
                                 alt="${escapeHtml(filename)}" 
                                 style="max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 10px;">
                        </div>
                    `;
                });
            }

            if (final && Array.isArray(final.search_results) && final.search_results.length > 0) {
                html += `<h4 style="margin-top:15px;">🔍 搜索结果 (${final.search_results.length}条)</h4>`;
                final.search_results.forEach((search, index) => {
                    const title = (search && search.title) ? search.title : '';
                    const snippet = (search && search.snippet) ? search.snippet : '';
                    const link = (search && (search.url || search.link)) ? (search.url || search.link) : '';
                    html += `
                        <div class="search-item">
                            <p><strong>${index + 1}. ${escapeHtml(title)}</strong></p>
                            <p>${escapeHtml(snippet)}</p>
                            ${link ? `<p><a href="${escapeHtml(link)}" target="_blank" style="color: #4facfe;">查看原文</a></p>` : ''}
                        </div>
                    `;
                });
            }

            responseContent.innerHTML = html;
            renderStreamDebug();
        }

        function renderFinalFromJson(result, startTime) {
            const endTime = Date.now();
            const responseTime = endTime - startTime;
            requestCount++;
            totalResponseTime += responseTime;
            successCount++;
            const normalized = {
                response: result.response || result.answer || '',
                images: result.images || [],
                search_results: result.search_results || [],
                timing: result.timing || {},
                metadata: result.metadata || {}
            };
            streamState = {
                text: normalized.response,
                toolCalls: [],
                toolEvents: [],
                usage: normalized.metadata ? normalized.metadata.usage : null,
                final: normalized
            };
            renderStream();
            displayTiming(normalized.timing || {});
        }
        
        // 显示响应结果
        function renderStreamDebug() {
            const debug = document.getElementById('streamDebug');
            const tokenItems = document.getElementById('tokenItems');
            const toolItems = document.getElementById('toolItems');
            if (!streamState) {
                debug.style.display = 'none';
                return;
            }

            const usage = streamState.usage;
            const toolCalls = Array.isArray(streamState.toolCalls) ? streamState.toolCalls : [];
            const toolEvents = Array.isArray(streamState.toolEvents) ? streamState.toolEvents : [];
            const hasAny = (usage && typeof usage === 'object') || toolCalls.length > 0 || toolEvents.length > 0;
            if (!hasAny) {
                debug.style.display = 'none';
                return;
            }
            debug.style.display = 'block';

            let tokenHtml = '';
            if (usage && typeof usage === 'object') {
                const pt = (usage.prompt_tokens != null) ? usage.prompt_tokens : 0;
                const ct = (usage.completion_tokens != null) ? usage.completion_tokens : 0;
                const tt = (usage.total_tokens != null) ? usage.total_tokens : 0;
                tokenHtml = `
                    <div class="timing-item">
                        <span class="timing-name">prompt_tokens:</span>
                        <span class="timing-value">${pt}</span>
                    </div>
                    <div class="timing-item">
                        <span class="timing-name">completion_tokens:</span>
                        <span class="timing-value">${ct}</span>
                    </div>
                    <div class="timing-item">
                        <span class="timing-name">total_tokens:</span>
                        <span class="timing-value">${tt}</span>
                    </div>
                `;
            }
            tokenItems.innerHTML = tokenHtml;

            let toolHtml = '';
            if (toolCalls.length > 0) {
                toolHtml += `<div style="margin-bottom:10px; color:#495057; font-weight:500;">本次调用工具（计划）</div>`;
                toolCalls.forEach((tc, idx) => {
                    const fn = tc && tc.function ? tc.function : {};
                    const name = fn.name || 'unknown';
                    const args = fn.arguments || '{}';
                    toolHtml += `
                        <div class="timing-item" style="align-items:flex-start;">
                            <span class="timing-name">${idx + 1}. ${escapeHtml(name)}</span>
                            <span class="timing-value" style="max-width:60%; white-space:normal; text-align:right;">${escapeHtml(args)}</span>
                        </div>
                    `;
                });
            }
            if (toolEvents.length > 0) {
                toolHtml += `<div style="margin-top:15px; margin-bottom:10px; color:#495057; font-weight:500;">工具执行（实时）</div>`;
                toolEvents.slice(-20).forEach((ev) => {
                    const name = ev.tool || 'unknown';
                    const ok = ev.ok ? 'ok' : 'fail';
                    const ms = ev.elapsed_s ? Math.round(ev.elapsed_s * 1000) : 0;
                    const preview = ev.result_preview ? ev.result_preview : '';
                    toolHtml += `
                        <div class="timing-item" style="align-items:flex-start;">
                            <span class="timing-name">${escapeHtml(name)} (${ok})</span>
                            <span class="timing-value" style="max-width:60%; white-space:normal; text-align:right;">${ms}ms</span>
                        </div>
                        ${preview ? `<div style="color:#6c757d; font-size:0.85em; margin: -6px 0 10px 0; white-space:pre-wrap;">${escapeHtml(preview)}</div>` : ''}
                    `;
                });
            }
            toolItems.innerHTML = toolHtml;
        }

        function escapeHtml(text) {
            const s = String(text == null ? '' : text);
            return s
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function renderMarkdown(md) {
            const src = String(md == null ? '' : md);
            if (!src) return '';
            const blocks = src.split('```');
            let out = '';
            for (let i = 0; i < blocks.length; i++) {
                const part = blocks[i];
                if (i % 2 === 1) {
                    const code = escapeHtml(part.replace(/^\w+\n/, ''));
                    out += `<pre style="background:#0b1020; color:#e5e7eb; padding:12px; border-radius:8px; overflow:auto;"><code>${code}</code></pre>`;
                } else {
                    out += renderMarkdownInline(part);
                }
            }
            return out;
        }

        function renderMarkdownInline(text) {
            let s = escapeHtml(text);
            s = s.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            s = s.replace(/^######\s?(.*)$/gm, '<h6>$1</h6>');
            s = s.replace(/^#####\s?(.*)$/gm, '<h5>$1</h5>');
            s = s.replace(/^####\s?(.*)$/gm, '<h4>$1</h4>');
            s = s.replace(/^###\s?(.*)$/gm, '<h3>$1</h3>');
            s = s.replace(/^##\s?(.*)$/gm, '<h2>$1</h2>');
            s = s.replace(/^#\s?(.*)$/gm, '<h1>$1</h1>');
            s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            s = s.replace(/`([^`]+?)`/g, '<code style="background:#f1f3f4; padding:2px 4px; border-radius:4px;">$1</code>');
            s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" style="color:#4facfe;">$1</a>');
            s = s.replace(/^\s*-\s+(.*)$/gm, '<li>$1</li>');
            s = s.replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul style="margin-left:20px;">${m}</ul>`);
            s = s.replace(/\n{2,}/g, '</p><p>');
            s = `<p>${s}</p>`;
            s = s.replace(/<p>\s*<\/p>/g, '');
            s = s.replace(/\n/g, '<br>');
            return s;
        }
        
        // 显示耗时分析
        function displayTiming(timing) {
            const timingBreakdown = document.getElementById('timingBreakdown');
            const timingItems = document.getElementById('timingItems');
            
            if (Object.keys(timing).length === 0) {
                timingBreakdown.style.display = 'none';
                return;
            }
            
            timingBreakdown.style.display = 'block';
            
            let html = '';
                const timingNames = {
                    'total': '总耗时',
                    'route': '路由决策',
                    'connect': '数据库连接',
                    'expand': '查询扩展',
                'encode_text': '文本编码',
                'search_text': '文本搜索',
                'read_image': '图片读取',
                'encode_image': '图片编码',
                    'search_image': '图片搜索',
                    'llm': '大模型调用'
                };
                
                for (const [key, value] of Object.entries(timing)) {
                    if (value > 0) {
                        const ms = Math.round(value * 1000);
                        html += `
                        <div class="timing-item">
                            <span class="timing-name">${timingNames[key] || key}:</span>
                            <span class="timing-value">${ms}ms</span>
                        </div>
                    `;
                    }
                }
            
            timingItems.innerHTML = html;
        }
        
        // 显示错误
        function showError(message) {
            const responseArea = document.getElementById('responseArea');
            const responseContent = document.getElementById('responseContent');
            
            responseArea.style.display = 'block';
            responseContent.innerHTML = `<div class="error-message">${message}</div>`;
        }
        
        // 清空聊天
        function clearChat() {
            document.getElementById('responseArea').style.display = 'none';
            document.getElementById('responseContent').innerHTML = '';
            document.getElementById('timingBreakdown').style.display = 'none';
        }
        
        // 更新指标显示
        function updateMetricsDisplay() {
            document.getElementById('totalRequests').textContent = requestCount;
            document.getElementById('avgResponseTime').textContent = 
                requestCount > 0 ? Math.round(totalResponseTime / requestCount) : 0;
            document.getElementById('successRate').textContent = 
                requestCount > 0 ? `${Math.round((successCount / requestCount) * 100)}%` : '100%';
            document.getElementById('activeTools').textContent = 
                document.getElementById('useRag').checked + document.getElementById('useSearch').checked;
        }
        
        // 刷新指标
        async function refreshMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const metrics = await response.json();
                
                // 这里可以更新更详细的指标
                console.log('Metrics:', metrics);
                
            } catch (error) {
                console.error('Failed to refresh metrics:', error);
            }
        }

        async function loadConfig() {
            try {
                const resp = await fetch('/api/config');
                const cfg = await resp.json();
                document.getElementById('arkBaseUrl').value = cfg.ark_base_url || '';
                document.getElementById('arkModel').value = cfg.ark_model || '';
                document.getElementById('agentMode').value = cfg.agent_mode || '';
                const status = cfg.key_set ? `已设置: ${cfg.ark_api_key || 'set'}` : '未设置：当前将走离线模式（无法生成大模型最终答案）';
                document.getElementById('arkKeyStatus').textContent = status;
            } catch (e) {
                document.getElementById('arkKeyStatus').textContent = '读取配置失败';
            }
        }

        async function saveConfig() {
            const form = new FormData();
            const k = document.getElementById('arkApiKey').value || '';
            const u = document.getElementById('arkBaseUrl').value || '';
            const m = document.getElementById('arkModel').value || '';
            const mode = document.getElementById('agentMode').value || '';
            if (k) form.append('ark_api_key', k);
            form.append('ark_base_url', u);
            form.append('ark_model', m);
            form.append('agent_mode', mode);
            try {
                const resp = await fetch('/api/config', { method: 'POST', body: form });
                const cfg = await resp.json();
                document.getElementById('arkApiKey').value = '';
                const status = cfg.key_set ? `已设置: ${cfg.ark_api_key || 'set'}` : '未设置：当前将走离线模式（无法生成大模型最终答案）';
                document.getElementById('arkKeyStatus').textContent = status;
                showError('配置已保存，可直接发起对话进行流式验证');
            } catch (e) {
                showError('保存配置失败');
            }
        }
        
        // 重置统计
        function resetMetrics() {
            requestCount = 0;
            totalResponseTime = 0;
            successCount = 0;
            errorCount = 0;
            updateMetricsDisplay();
            
            // 显示成功消息
            const responseArea = document.getElementById('responseArea');
            const responseContent = document.getElementById('responseContent');
            
            responseArea.style.display = 'block';
            responseContent.innerHTML = '<div class="success-message">统计已重置</div>';
            
            setTimeout(() => {
                responseArea.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
